<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      background: #f5f0e8;
      color: #333;
      padding: 10px;
    }
    h3 {
      font-size: 13px;
      margin-bottom: 6px;
      color: #5c3a1e;
      border-bottom: 1px solid #b2a89e;
      padding-bottom: 4px;
    }
    .info {
      font-size: 11px;
      color: #777;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0;
    }
    .row label {
      flex: 1;
      font-size: 11px;
      color: #555;
    }
    .row input[type="checkbox"] {
      cursor: pointer;
    }
    .row input[type="number"],
    .row input[type="text"] {
      width: 70px;
      padding: 2px 5px;
      border: 1px solid #b2a89e;
      border-radius: 0;
      background: #fff;
      color: #333;
      font-size: 11px;
    }
    .section-title {
      font-size: 11px;
      font-weight: bold;
      color: #5c3a1e;
      margin-top: 8px;
      margin-bottom: 3px;
    }
    .btn {
      width: 100%;
      padding: 6px;
      border: 1px solid #5c3a1e;
      border-radius: 0;
      background: #5c3a1e;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #6d4525; }
    .btn:active { background: #4a2e16; }
    #status {
      margin-top: 6px;
      font-size: 11px;
      color: #2e6e3a;
      min-height: 14px;
    }
    .footer {
      margin-top: 10px;
      padding-top: 6px;
      border-top: 1px solid #b2a89e;
      font-size: 10px;
      color: #999;
      text-align: center;
    }
    .footer a {
      color: #5c3a1e;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
    <img src="icons/icon48.png" width="28" height="28" style="image-rendering: pixelated;">
    <h3 style="margin:0;border:none;padding:0">E-Hentai Downloader</h3>
  </div>
  <div class="info">
    Go to any gallery page and click "Download Gallery" on the panel.
  </div>

  <div class="section-title">Download Settings</div>

  <div class="row">
    <label>Max threads:</label>
    <input type="number" id="threads" value="3" min="1" max="10">
  </div>
  <div class="row">
    <label>Retry count:</label>
    <input type="number" id="retries" value="3" min="0" max="10">
  </div>
  <div class="row">
    <label>Delay (ms):</label>
    <input type="number" id="delay" value="500" min="0" max="5000" step="100">
  </div>

  <div class="section-title">Options</div>

  <div class="row">
    <label>Number images</label>
    <input type="checkbox" id="numberImages">
  </div>
  <div class="row">
    <label>Save as .CBZ</label>
    <input type="checkbox" id="saveAsCbz">
  </div>
  <div class="row">
    <label>Include gallery info</label>
    <input type="checkbox" id="savePageLinks" checked>
  </div>
  <div class="row">
    <label>Safe filenames</label>
    <input type="checkbox" id="replaceChars" checked>
  </div>

  <button class="btn" id="saveBtn">Save Settings</button>
  <div id="status"></div>

  <div class="footer">
    Based on <a href="https://github.com/ccloli/E-Hentai-Downloader" target="_blank">ccloli/E-Hentai-Downloader</a> (GPL-3.0)
  </div>

  <script src="popup.js"></script>
</body>
</html>
